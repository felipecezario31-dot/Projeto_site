<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Conexão Escola</title>
</head>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        min-height: 100vh;
        font-family: 'Lato', sans-serif;
        background: linear-gradient(135deg, #4e51ec 0%, #040d30 45%, #00030e 100%);
        color: #ffffff;
        display: grid;
        place-items: center;
        padding: 20px;
    }

    .login-page {
        width: 100%;
        max-width: 420px;
    }

    .login-card {
        background: #e9e2e2;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }

    .login-brand {
        text-align: center;
        margin-bottom: 28px;
    }

    .login-logo {
        width: 100px;
        height: 80px;
        object-fit: cover;
        border-radius: 15px;
        margin-bottom: 10px;
    }

    .login-brand h1 {
        color: #000;
        font-size: 2rem;
        margin-bottom: 8px;
    }

    .login-welcome {
        color: rgba(0, 0, 0, 0.75);
    }

    .login-form {
        display: grid;
        gap: 18px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .form-group label {
        font-size: 0.95rem;
        color: #000;
        font-weight: 600;
    }

    .form-group input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.9);
        color: #000;
        font-size: 0.95rem;
        font-family: inherit;
        transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: #4e51ec;
        background: #fff;
    }

    .form-group input::placeholder {
        color: rgba(0, 0, 0, 0.4);
    }

    /* ── campo com erro ── */
    .form-group input.input-erro {
        border-color: #c0392b;
        background: #fff5f5;
    }

    /* ── mensagem de erro ── */
    .alerta-erro {
        background: #fdecea;
        border: 1px solid #c0392b;
        border-radius: 8px;
        padding: 10px 14px;
        color: #c0392b;
        font-size: 0.9rem;
        text-align: center;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #020049;
        color: #ffffff;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.2s ease, transform 0.1s ease;
        font-family: inherit;
    }

    .btn-submit:hover {
        background-color: #0d0066;
    }

    .btn-submit:active {
        transform: scale(0.98);
    }

    @media (max-width: 480px) {
        .login-card {
            padding: 24px;
        }

        .login-brand h1 {
            font-size: 1.75rem;
        }

        .login-logo {
            width: 80px;
            height: 64px;
        }
    }
</style>

<body>
    <div class="login-page">
        <div class="login-card">

            <div class="login-brand">
                <img src="{{ url_for('static', filename='img/logo2.jpg') }}" alt="Logo" class="login-logo">
                <h1>Login</h1>
                <p class="login-welcome">Bem vindo ao Conexão Escola</p>
            </div>

            <!-- mensagem de erro vinda do Flask (flash) -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alerta-erro">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" action="/login" class="login-form">

                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        placeholder="Digite seu usuário"
                        {% if error %}class="input-erro"{% endif %}
                    >
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        required
                        placeholder="Digite sua senha"
                        {% if error %}class="input-erro"{% endif %}
                    >
                </div>

                <button type="submit" class="btn-submit">Entrar no Site</button>

            </form>
        </div>
    </div>
</body>

</html>
