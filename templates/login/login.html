<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Projeto Site</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <img src="{{ url_for('static', filename='img/logo2.jpg') }}" alt="Logo" class="login-logo">
                <h1>Login</h1>
                <p class="login-welcome">Bem vindo ao Conexão Escola</p>
            </div>

            <form method="post" class="login-form">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
                </div>
                <button type="submit" class="btn-submit">Entrar no Site</button>
            </form>
        </div>
    </div>
</body>

</html>
